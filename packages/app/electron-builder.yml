# electron-builder config — Jarvis packaging (cdd/tasks/packaging-hardening.md, Gate D).
# Started as the A7 packaging SMOKE config (dir/unsigned); hardened here into the real NSIS
# installer. Every non-obvious choice is commented at the point of decision (A7 discipline).
#
# Build: `npm run dist`   (root) -> NSIS installer in ../../dist-package
#        `npm run package` (root) -> win-unpacked only (fast native/asar/spawn verification)
appId: com.jarvis.assistant
productName: Jarvis
copyright: © 2026 Jarvis

directories:
  # Keep the packaged tree OUT of the app package dir (gitignored at repo root via dist-package/).
  output: ../../dist-package
  # NSIS include script (installer.nsh) + any future installer resources live here.
  buildResources: build

# App + installer icon. A 256x256 PNG (assets/icon.png, generated by scripts/make-icon.mjs — pure
# Node, no rasterizer dependency); electron-builder derives the multi-resolution app/exe/installer
# .ico from it. (assets/tray.ico stays as the 16/32 tray glyph; the runtime tray icon itself is an
# embedded base64 PNG in windows.ts.)
icon: assets/icon.png

# ASAR on: the app + its pure-JS dependency tree (including the @jarvis/tools-mcp workspace package,
# collected via the hoisted-monorepo symlink) are packed into resources/app.asar.
asar: true

# What goes into the app.asar. node_modules production deps are collected automatically by
# electron-builder from the hoisted root node_modules + the @jarvis/* workspace symlinks; the
# negative globs below PRUNE dead weight from that automatic collection (size hardening).
files:
  - out/** # electron-vite output: main/index.js, preload/index.mjs, renderer/**
  - assets/** # wake.wav, icons
  - package.json
  # --- size pruning (cdd/tasks/packaging-hardening.md "size pruning where cheap and safe") ---
  # TypeScript declaration files are never require()'d at runtime. googleapis alone ships ~164 MB
  # of .d.ts (of its ~203 MB); ~184 MB of .d.ts exist across all deps. Dropping them is the single
  # biggest safe win and touches no module resolution. Source maps + markdown likewise never load.
  # NB: googleapis' build/src/index.js eagerly require()s EVERY api module, so individual api dirs
  # (gmail/calendar/drive) CANNOT be pruned without rewriting imports — only the .d.ts are safe.
  - "!**/*.d.ts"
  - "!**/*.d.ts.map"
  - "!**/*.js.map"
  - "!**/*.md"
  - "!**/*.markdown"

# Native modules CANNOT be loaded from inside an asar archive — electron-builder marks these paths
# "unpacked" in the asar header and drops the real files into resources/app.asar.unpacked/. The
# module loader (main process AND ELECTRON_RUN_AS_NODE children) transparently redirects the .node
# reads to the unpacked copy, so require() specifiers are unchanged. We unpack ONLY the native
# packages; their pure-JS deps (bindings, etc.) stay in the asar and resolve normally.
#   - better-sqlite3       -> brain store (tools-mcp worker process)
#   - onnxruntime-node     -> VAD (main) + brain embedder (tools-mcp worker)
asarUnpack:
  - "**/node_modules/better-sqlite3/**"
  - "**/node_modules/onnxruntime-node/**"

win:
  target:
    - target: nsis
      arch:
        - x64
  # SIGNING TODO (accepted for 0.1.0): the build is UNSIGNED. Windows SmartScreen will warn on
  # first run until an Authenticode/EV cert is provisioned. When a cert is available, set
  # `certificateFile`/`certificatePassword` (or a signing hook) here and flip signAndEditExecutable.
  signAndEditExecutable: true

nsis:
  # "one-click off (per-user install)" per the task file: an assisted wizard (not silent one-click),
  # installed per-user so NO admin elevation is ever required — the clean-machine Gate D install
  # works from a standard account, and a `/S /D=<dir>` silent install can target a temp dir for
  # verification.
  oneClick: false
  perMachine: false
  allowElevation: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Jarvis
  # Autostart is registered at RUNTIME by the app (app.setLoginItemSettings, HKCU Run key) when the
  # user enables "launch on startup" — the installer does not create it. The custom uninstall macro
  # (build/installer.nsh) removes that Run value so no orphan autostart entry survives uninstall.
  include: build/installer.nsh
  # Keep user data on uninstall (DECISION — task file's scrub-vs-keep call): <userData> =
  # %APPDATA%/Jarvis holds sessions/, brain/ (the second-brain vault + index), plugin config/secrets
  # and the fetched models/ (~900 MB). Sessions/brain are genuine user content; models are
  # expensive to re-fetch. The uninstaller therefore leaves %APPDATA%/Jarvis in place; a user who
  # wants a full scrub deletes that folder manually (documented in docs/gate-d-checklist.md).
  deleteAppDataOnUninstall: false
